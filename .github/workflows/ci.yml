name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  app-checks:
    name: App checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Lint frontend
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test frontend
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Test Tauri core
        working-directory: src-tauri
        run: cargo test --lib

  plugin-source-check:
    name: Plugin source check
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify committed bridge DLL exports
        shell: pwsh
        run: |
          $dll = "src-tauri/resources/DazPilotBridge.dll"
          if (-not (Test-Path $dll)) {
            throw "Missing $dll. Build and commit the bridge DLL before releasing."
          }

          $dumpbin = "${env:VCToolsInstallDir}bin\Hostx64\x64\dumpbin.exe"
          if (-not (Test-Path $dumpbin)) {
            $dumpbin = (Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter dumpbin.exe |
              Where-Object FullName -like "*Hostx64*x64*" |
              Select-Object -First 1 -ExpandProperty FullName)
          }
          if (-not $dumpbin) {
            throw "dumpbin.exe not found."
          }

          $exports = & $dumpbin /EXPORTS $dll | Out-String
          foreach ($symbol in @("getSDKVersion", "getPluginDefinition")) {
            if ($exports -notmatch "\b$symbol\b") {
              throw "Bridge DLL is missing required Daz export: $symbol"
            }
          }
