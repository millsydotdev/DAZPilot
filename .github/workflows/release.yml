name: 'Publish Release'

on:
  push:
    tags:
      - 'v*' # Triggers the workflow when you push a version tag like v0.1.0

jobs:
  publish:
    name: 'Build & Release (Windows)'
    runs-on: windows-latest
    
    permissions:
      contents: write # Required for creating/uploading release assets

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Setup Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Verify Bundled Resources
        shell: pwsh
        run: |
          $requiredFiles = @(
            "src-tauri/resources/DazPilotBridge.dll",
            "src-tauri/resources/VibeBridgePlugin.dll",
            "src-tauri/resources/llama/llama-server.exe",
            "src-tauri/resources/llama/ggml.dll",
            "src-tauri/resources/llama/llama.dll",
            "src-tauri/resources/llama/llava_shared.dll"
          )
          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              Write-Error "CRITICAL ERROR: Required file '$file' is missing! Make sure it is committed to Git."
              exit 1
            } else {
              Write-Host "Verified: '$file' exists."
            }
          }

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Frontend Assets
        run: npm run build

      - name: Build & Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # To sign your Windows installer, set up Action Secrets and uncomment the variables below:
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'DazPilot v__VERSION__'
          releaseBody: |
            Welcome to the DazPilot v__VERSION__ release!
            
            ### Installation Instructions
            1. Download the Windows installer (`DazPilot___VERSION___x64_en-US.msi` or `.exe`) from the assets below.
            2. Run the installer and follow the instructions to set up DazPilot on your computer.
            3. On first launch, the wizard will help you download a local GGUF AI model (such as TinyLlama) or configure your existing ones.
            
            *Sha256 checksums are provided in the release details.*
          releaseDraft: true
          prerelease: false
