name: Plugin Release

on:
  push:
    tags:
      - 'plugin-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example plugin-v0.1.0
        required: true
        type: string

concurrency:
  group: plugin-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  build-plugin:
    name: Build Plugin (${{ matrix.arch-label }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Daz Studio SDK ships x64 Windows libs only; ARM64 Studio uses the x64 plugin.
          - arch: x64
            arch-label: x64
            cmake-args: -A x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: true
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Build C++ Bridge Plugin
        run: |
          cmake -S plugins/daz3d-bridge -B plugins/daz3d-bridge/build `
            -DCMAKE_BUILD_TYPE=Release `
            ${{ matrix.cmake-args }}
          cmake --build plugins/daz3d-bridge/build --config Release

      - name: Run C++ Bridge Plugin Unit Tests
        if: matrix.arch == 'x64'
        run: |
          ctest --test-dir plugins/daz3d-bridge/build -C Release --output-on-failure

      - name: Sync bridge command manifest
        run: powershell -ExecutionPolicy Bypass -File scripts/sync-bridge-manifest.ps1

      - name: Stage release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path plugin-staging | Out-Null
          & ./scripts/stage-bridge-dll.ps1 -Destination "plugin-staging/DazPilotBridge-${{ matrix.arch-label }}.dll"
          & ./scripts/stage-bridge-dll.ps1 -Destination "plugin-staging/DazPilotBridge.dll"
          Copy-Item plugins/daz3d-bridge/bridge_commands.manifest plugin-staging/

      - name: Upload built binaries
        uses: actions/upload-artifact@v4
        with:
          name: plugin-windows-${{ matrix.arch-label }}
          path: plugin-staging/*
          if-no-files-found: error

  publish-plugin-release:
    needs: build-plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: plugin-assets
          merge-multiple: true

      - name: Create or Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: "DazPilot Bridge Plugin ${{ env.RELEASE_TAG }}"
          tag: ${{ env.RELEASE_TAG }}
          body: |
            Pre-compiled Daz Studio bridge plugin for Windows.

            | Asset | Architecture |
            | --- | --- |
            | `DazPilotBridge-x64.dll` | Windows x64 (also used on ARM64 Daz Studio) |
            | `DazPilotBridge.dll` | Generic x64 build |

            Install: copy the correct DLL into your Daz Studio plugins folder and restart Daz.
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "plugin-assets/**/*"
          artifactErrorsFailBuild: true
          replacesArtifacts: true
          makeLatest: false
