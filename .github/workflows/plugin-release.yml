name: Plugin Release

on:
  push:
    tags:
      - 'plugin-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example plugin-v0.1.0
        required: true
        type: string

concurrency:
  group: plugin-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  build-plugin:
    name: Build Plugin
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: true

      # ── Build C++ Bridge Plugin ──────────────────────────────────────
      - name: Build C++ Bridge Plugin
        run: |
          cmake -S plugins/daz3d-bridge -B plugins/daz3d-bridge/build -DCMAKE_BUILD_TYPE=Release
          cmake --build plugins/daz3d-bridge/build --config Release

      # ── Run C++ Unit Tests ───────────────────────────────────────────
      - name: Run C++ Bridge Plugin Unit Tests
        run: |
          ctest --test-dir plugins/daz3d-bridge/build --output-on-failure

      # ── Upload built binary as runner artifact ───────────────────────
      - name: Upload built binary
        uses: actions/upload-artifact@v4
        with:
          name: plugin-windows
          path: src-tauri/resources/DazPilotBridge.dll
          if-no-files-found: error

  publish-plugin-release:
    needs: build-plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: plugin-assets
          merge-multiple: true

      - name: Create or Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: "DazPilot Bridge Plugin ${{ env.RELEASE_TAG }}"
          tag: ${{ env.RELEASE_TAG }}
          body: "Pre-compiled Daz Studio bridge plugin binaries for Windows."
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "plugin-assets/**/*"
          artifactErrorsFailBuild: true
          replacesArtifacts: true
          makeLatest: false
