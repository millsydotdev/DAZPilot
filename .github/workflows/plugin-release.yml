name: Plugin Release

on:
  push:
    tags:
      - 'v*'
      - 'plugin-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach the plugin asset to
        required: true
        type: string

concurrency:
  group: plugin-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-plugin:
    name: Build plugin (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runner: windows-2022
            artifact_name: DazPilotBridge.dll
            plugin_zip: DazPilotBridge-windows-x86_64
          - name: macos
            runner: macos-latest
            artifact_name: libDazPilotBridge.dylib
            plugin_zip: DazPilotBridge-macos-universal
          - name: linux
            runner: ubuntu-24.04
            artifact_name: libDazPilotBridge.so
            plugin_zip: DazPilotBridge-linux-x86_64

    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Cache Daz SDK
        uses: actions/cache@v4
        with:
          path: thirdparty/DAZStudio4.5+ SDK
          key: ${{ runner.os }}-daz-sdk-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Configure and Build
        working-directory: plugins/daz3d-bridge
        run: |
          cmake -B build -DDAZ_SDK_ROOT="${{ github.workspace }}/thirdparty/DAZStudio4.5+ SDK"
          cmake --build build --config Release

      - name: Package plugin
        shell: bash
        run: |
          mkdir -p release/plugin
          cp plugins/daz3d-bridge/dist/${{ matrix.artifact_name }} release/plugin/
          cp plugins/daz3d-bridge/README.md release/plugin/
          cd release/plugin
          tar czf ../../${{ matrix.plugin_zip }}-${RELEASE_TAG}.tar.gz *
          cd ../..
          if [ "${{ matrix.runner }}" = "windows-2022" ]; then
            7z a ${{ matrix.plugin_zip }}-${RELEASE_TAG}.zip ./release/plugin/*
          fi

      - name: Upload plugin release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          files: |
            ${{ matrix.plugin_zip }}-${{ env.RELEASE_TAG }}.tar.gz
            ${{ matrix.plugin_zip }}-${{ env.RELEASE_TAG }}.zip
            plugins/daz3d-bridge/dist/${{ matrix.artifact_name }}
