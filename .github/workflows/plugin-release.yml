name: Plugin Release

on:
  push:
    tags:
      - 'plugin-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example plugin-v0.1.0
        required: true
        type: string

concurrency:
  group: plugin-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  build-plugin:
    name: Build Plugin
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            asset-name: DazPilotBridge.dll
          - os: macos-latest
            platform: macos
            asset-name: libDazPilotBridge.dylib
          - os: ubuntu-latest
            platform: linux
            asset-name: libDazPilotBridge.so

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: true

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      # ── Build C++ Bridge Plugin ──────────────────────────────────────
      - name: Build C++ Bridge Plugin
        shell: bash
        run: |
          # For macOS, build a universal binary
          if [ "${{ matrix.platform }}" = "macos" ]; then
            cmake -S plugins/daz3d-bridge -B plugins/daz3d-bridge/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          else
            cmake -S plugins/daz3d-bridge -B plugins/daz3d-bridge/build -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build plugins/daz3d-bridge/build --config Release

      # ── Run C++ Unit Tests ───────────────────────────────────────────
      - name: Run C++ Bridge Plugin Unit Tests
        run: |
          ctest --test-dir plugins/daz3d-bridge/build --output-on-failure

      # ── Upload built binary as runner artifact ───────────────────────
      - name: Upload built binary
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.platform }}
          path: |
            plugins/daz3d-bridge/dist/${{ matrix.asset-name }}
            src-tauri/resources/${{ matrix.asset-name }}
          if-no-files-found: error

  publish-plugin-release:
    needs: build-plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: plugin-assets
          merge-multiple: true

      - name: Create or Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: "DazPilot Bridge Plugin ${{ env.RELEASE_TAG }}"
          tag: ${{ env.RELEASE_TAG }}
          body: "Pre-compiled Daz Studio bridge plugin binaries for Windows, macOS, and Linux."
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "plugin-assets/**/*"
          artifactErrorsFailBuild: true
          replacesArtifacts: true
          makeLatest: false
