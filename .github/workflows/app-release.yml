name: App Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.1.0
        required: true
        type: string

concurrency:
  group: app-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ───────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
            rust-targets: ""
            arch-label: x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            bundles: nsis,msi
            rust-targets: aarch64-pc-windows-msvc
            arch-label: arm64

          # ── macOS ─────────────────────────────────────────────────────
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
            rust-targets: ""
            arch-label: arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            bundles: app,dmg
            rust-targets: x86_64-apple-darwin
            arch-label: x64

          # ── Linux ─────────────────────────────────────────────────────
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb,rpm
            rust-targets: ""
            arch-label: x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: appimage,deb,rpm
            rust-targets: ""
            arch-label: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: true
          ref: ${{ github.event.inputs.tag || github.ref }}
          token: ${{ secrets.GH_PAT || github.token }}

      # ── System dependencies ──────────────────────────────────────────
      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1 \
            libjavascriptcoregtk-4.1-dev \
            libnm-dev \
            xdg-utils \
            libfuse2 \
            rpm

      # ── Toolchain setup ──────────────────────────────────────────────
      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm


      # ── Frontend ─────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── Build C++ Bridge Plugin (Windows Only) ───────────────────────
      - name: Build C++ Bridge Plugin
        if: matrix.os == 'windows-latest'
        run: |
          cmake -S plugins/daz3d-bridge -B plugins/daz3d-bridge/build -DCMAKE_BUILD_TYPE=Release -A x64
          cmake --build plugins/daz3d-bridge/build --config Release

      - name: Sync bridge command manifest
        if: matrix.os == 'windows-latest'
        run: powershell -ExecutionPolicy Bypass -File scripts/sync-bridge-manifest.ps1

      - name: Stage arch-specific bridge plugin
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # SDK is x64-only; ship the same plugin for Windows ARM64 app builds.
          & ./scripts/stage-bridge-dll.ps1 -Destination "src-tauri/resources/DazPilotBridge-${{ matrix.arch-label }}.dll"
          & ./scripts/stage-bridge-dll.ps1 -Destination "src-tauri/resources/DazPilotBridge.dll"

      # ── Run C++ Unit Tests (Windows Only) ────────────────────────────
      - name: Run C++ Bridge Plugin Unit Tests
        if: matrix.os == 'windows-latest' && matrix.target == 'x86_64-pc-windows-msvc'
        run: |
          ctest --test-dir plugins/daz3d-bridge/build -C Release --output-on-failure

      # ── Tauri build ──────────────────────────────────────────────────
      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles ${{ matrix.bundles }} --target ${{ matrix.target }}

      # ── Upload artifacts ─────────────────────────────────────────────
      - name: Upload updater JSON
        uses: actions/upload-artifact@v4
        with:
          name: updater-json-${{ strategy.job-index }}
          path: src-tauri/target/**/release/bundle/updater/*.json
          if-no-files-found: warn

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ strategy.job-index }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/nsis/*.zip
            src-tauri/target/**/release/bundle/rpm/*.rpm
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/macos/*.dmg
            src-tauri/target/**/release/bundle/dmg/*.sig
            src-tauri/target/**/release/bundle/deb/*.sig
            src-tauri/target/**/release/bundle/appimage/*.sig
            src-tauri/target/**/release/bundle/msi/*.sig
            src-tauri/target/**/release/bundle/nsis/*.sig
            src-tauri/target/**/release/bundle/rpm/*.sig
            src-tauri/target/**/release/bundle/macos/*.sig
            src-tauri/resources/DazPilotBridge.dll
            src-tauri/resources/DazPilotBridge-*.dll
            src-tauri/resources/libDazPilotBridge.dylib
            src-tauri/resources/libDazPilotBridge.so
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────
  publish-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ env.RELEASE_TAG }}"
          VER="${VERSION#v}"
          awk -v ver="$VER" '
            BEGIN { capture=0 }
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## / { capture=0; exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            {
              echo "## DazPilot ${VERSION}"
              echo ""
              echo "Multi-platform desktop build. See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md)."
              echo ""
              echo "### Install"
              echo ""
              echo "- **Windows:** MSI or NSIS installer for x64 or ARM64."
              echo "- **macOS:** DMG or \`DAZPilot_*-apple-darwin.app.tar.gz\` for Apple Silicon or Intel."
              echo "- **Linux:** AppImage, deb, or rpm for amd64 or arm64."
              echo ""
              echo "### Daz Studio plugin"
              echo ""
              echo "Install \`DazPilotBridge-x64.dll\` from the [plugin-v${VER}](https://github.com/${{ github.repository }}/releases/tag/plugin-v${VER}) release."
            } > release_notes.md
          fi

      - name: Stage installable release files
        run: bash scripts/stage-release-assets.sh all-artifacts release-staging

      - name: Build latest.json from signatures
        env:
          VERSION: ${{ env.RELEASE_TAG }}
          REPO: ${{ github.repository }}
        run: |
          DOWNLOAD_BASE="https://github.com/${REPO}/releases/download/${VERSION}"
          VER="${VERSION#v}"

          # Create blank latest.json structure
          jq -n \
            --arg version "$VER" \
            --arg notes "See release page for details" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {}
            }' > release-staging/latest.json

          # Helper function to find a file and its signature, and add to latest.json
          add_platform_to_json() {
            local platform_key="$1"
            local file_pattern="$2"
            local sig_pattern="$3"

            if jq -e --arg k "$platform_key" '.platforms[$k] != null' release-staging/latest.json >/dev/null 2>&1; then
              return
            fi

            echo "Looking for $platform_key using file pattern: '$file_pattern' and sig pattern: '$sig_pattern'..."

            local file_path
            file_path=$(find release-staging -name "$file_pattern" -type f 2>/dev/null | head -1)

            local sig_path
            sig_path=$(find release-staging -name "$sig_pattern" -type f 2>/dev/null | head -1)

            if [ -n "$file_path" ] && [ -n "$sig_path" ]; then
              local filename
              filename=$(basename "$file_path")
              local signature
              signature=$(cat "$sig_path" | tr -d '\n\r' | xargs)

              echo "  Found file: $filename"
              echo "  Found signature: (length ${#signature})"

              jq --arg url "$DOWNLOAD_BASE/$filename" \
                 --arg sig_val "$signature" \
                 --arg key "$platform_key" \
                 '.platforms[$key] = {url: $url, signature: $sig_val}' \
                 release-staging/latest.json > tmp.json && mv tmp.json release-staging/latest.json
            else
              echo "  WARNING: Not found both file and signature for $platform_key"
            fi
          }

          # Tauri v2 updater platforms (staged macOS archives include the target triple when names collide)
          add_platform_to_json "darwin-aarch64" "DAZPilot_aarch64-apple-darwin.app.tar.gz" "DAZPilot_aarch64-apple-darwin.app.tar.gz.sig"
          add_platform_to_json "darwin-x86_64" "DAZPilot_x86_64-apple-darwin.app.tar.gz" "DAZPilot_x86_64-apple-darwin.app.tar.gz.sig"
          add_platform_to_json "darwin-aarch64" "*aarch64*.app.tar.gz" "*aarch64*.app.tar.gz.sig"
          add_platform_to_json "darwin-x86_64" "*x86_64-apple-darwin*.app.tar.gz" "*x86_64-apple-darwin*.app.tar.gz.sig"
          add_platform_to_json "darwin-universal" "*universal*.app.tar.gz" "*universal*.app.tar.gz.sig"

          add_platform_to_json "windows-x86_64" "*x64-setup.nsis.zip" "*x64-setup.nsis.zip.sig"
          add_platform_to_json "windows-aarch64" "*arm64-setup.nsis.zip" "*arm64-setup.nsis.zip.sig"

          add_platform_to_json "linux-x86_64" "*amd64.AppImage.tar.gz" "*amd64.AppImage.tar.gz.sig"
          add_platform_to_json "linux-aarch64" "*arm64.AppImage.tar.gz" "*arm64.AppImage.tar.gz.sig"

          echo "Generated latest.json:"
          cat release-staging/latest.json

      - name: Create or Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: "DazPilot ${{ env.RELEASE_TAG }}"
          tag: ${{ env.RELEASE_TAG }}
          bodyFile: "release_notes.md"
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "release-staging/*"
          artifactErrorsFailBuild: true
          replacesArtifacts: true
          removeArtifacts: true
          makeLatest: legacy
