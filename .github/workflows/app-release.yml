name: App Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.1.0
        required: true
        type: string

concurrency:
  group: app-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            runner: windows-2022
            bundles: nsis
            bridge_file: DazPilotBridge.dll
            plugin_zip: DazPilotBridge-windows-x86_64
          - name: macos
            runner: macos-latest
            bundles: app,dmg
            bridge_file: libDazPilotBridge.dylib
            plugin_zip: DazPilotBridge-macos-universal
          - name: linux
            runner: ubuntu-24.04
            bundles: appimage,deb
            bridge_file: libDazPilotBridge.so
            plugin_zip: DazPilotBridge-linux-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ github.event.inputs.tag || github.ref }}
          token: ${{ secrets.GH_PAT || github.token }}

      # ── Build bridge plugin from source ──────────────────────────────
      - name: Cache Daz SDK
        id: cache-daz
        uses: actions/cache@v4
        with:
          path: thirdparty/DAZStudio4.5+ SDK
          key: ${{ runner.os }}-daz-sdk-${{ hashFiles('plugins/daz3d-bridge/**') }}

      - name: Configure bridge build
        id: bridge-configure
        continue-on-error: true
        working-directory: plugins/daz3d-bridge
        run: |
          cmake -B build -DDAZ_SDK_ROOT="${{ github.workspace }}/thirdparty/DAZStudio4.5+ SDK"

      - name: Build bridge plugin
        id: bridge-build
        if: steps.bridge-configure.outcome == 'success'
        continue-on-error: true
        working-directory: plugins/daz3d-bridge
        run: |
          cmake --build build --config Release

      - name: Copy built bridge to app resources
        if: steps.bridge-build.outcome == 'success'
        shell: bash
        run: |
          mkdir -p src-tauri/resources
          cp plugins/daz3d-bridge/dist/${{ matrix.platform.bridge_file }} src-tauri/resources/

      - name: Package bridge plugin
        if: steps.bridge-build.outcome == 'success'
        shell: bash
        run: |
          mkdir -p release/plugin
          cp plugins/daz3d-bridge/dist/${{ matrix.platform.bridge_file }} release/plugin/
          cp plugins/daz3d-bridge/README.md release/plugin/
          cd release/plugin
          if [ "${{ matrix.platform.runner }}" = "windows-2022" ]; then
            7z a ../../${{ matrix.platform.plugin_zip }}-${RELEASE_TAG}.zip ./*
          else
            tar czf ../../${{ matrix.platform.plugin_zip }}-${RELEASE_TAG}.tar.gz ./*
          fi
          cd ../..

      - name: Check committed fallback resources
        if: steps.bridge-build.outcome != 'success'
        shell: bash
        run: |
          case "${{ matrix.platform.name }}" in
            windows)
              test -f src-tauri/resources/DazPilotBridge.dll || echo "::warning::DazPilotBridge.dll not found in src-tauri/resources/"
              ;;
            macos|linux)
              if [ -f "src-tauri/resources/${{ matrix.platform.bridge_file }}" ]; then
                echo "Using committed ${{ matrix.platform.bridge_file }}"
              else
                echo "::warning::${{ matrix.platform.bridge_file }} not committed; app will offer plugin download when published."
              fi
              ;;
          esac

      # ── Build frontend + Tauri app ──────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: DazPilot ${{ env.RELEASE_TAG }}
          releaseBody: |
            DazPilot - AI Co-Pilot for Daz Studio

            ## Installation
            1. Install this application
            2. The bridge plugin will be auto-installed to Daz Studio's plugins folder
            3. For AI SDK indexing, install the DAZStudio 4.5+ SDK via Daz Install Manager

            ## Auto-Update
            This release includes signed update artifacts. The app will check for updates automatically.

            ## Bridge Plugin
            Download the platform-specific bridge plugin from this release if you need to manually install it:
            - Windows: `DazPilotBridge-windows-x86_64-<tag>.zip` (contains `DazPilotBridge.dll`)
            - macOS: `DazPilotBridge-macos-universal-<tag>.tar.gz` (contains `libDazPilotBridge.dylib`)
            - Linux: `DazPilotBridge-linux-x86_64-<tag>.tar.gz` (contains `libDazPilotBridge.so`)

            ## Requirements
            - Daz Studio 4.5+
            - DAZStudio 4.5+ SDK (optional, for AI scripting intelligence)
          releaseDraft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          args: --bundles ${{ matrix.platform.bundles }}

      # ── Upload bridge plugin to the same release ────────────────────
      - name: Upload bridge plugin to release
        if: steps.bridge-build.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          files: |
            ${{ matrix.platform.plugin_zip }}-${{ env.RELEASE_TAG }}.tar.gz
            ${{ matrix.platform.plugin_zip }}-${{ env.RELEASE_TAG }}.zip
            plugins/daz3d-bridge/dist/${{ matrix.platform.bridge_file }}

      - name: Upload committed bridge to release (fallback)
        if: steps.bridge-build.outcome != 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          files: src-tauri/resources/${{ matrix.platform.bridge_file }}
