name: App Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.1.0
        required: true
        type: string

concurrency:
  group: app-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows (3) ───────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
            rust-targets: ""
            arch-label: x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            bundles: nsis,msi
            rust-targets: aarch64-pc-windows-msvc
            arch-label: arm64
          - os: windows-latest
            target: i686-pc-windows-msvc
            bundles: nsis,msi
            rust-targets: i686-pc-windows-msvc
            arch-label: x86

          # ── macOS on ARM runner (macos-14) ───────────────────────────
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: app,dmg
            rust-targets: ""
            arch-label: arm64-m14
          - os: macos-14
            target: x86_64-apple-darwin
            bundles: app,dmg
            rust-targets: x86_64-apple-darwin
            arch-label: x64-m14
          - os: macos-14
            target: universal-apple-darwin
            bundles: app,dmg
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            arch-label: universal-m14

          # ── macOS on Intel runner (macos-13) ─────────────────────────
          - os: macos-13
            target: x86_64-apple-darwin
            bundles: app,dmg
            rust-targets: ""
            arch-label: x64-m13
          - os: macos-13
            target: aarch64-apple-darwin
            bundles: app,dmg
            rust-targets: aarch64-apple-darwin
            arch-label: arm64-m13
          - os: macos-13
            target: universal-apple-darwin
            bundles: app,dmg
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            arch-label: universal-m13

          # ── Linux (4) ────────────────────────────────────────────────
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb,rpm
            rust-targets: ""
            arch-label: ubuntu22
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb,rpm
            rust-targets: ""
            arch-label: ubuntu24
          - os: ubuntu-24.04
            target: armv7-unknown-linux-gnueabihf
            bundles: appimage,deb
            rust-targets: armv7-unknown-linux-gnueabihf
            arch-label: armv7-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: appimage,deb,rpm
            rust-targets: ""
            arch-label: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: true
          ref: ${{ github.event.inputs.tag || github.ref }}
          token: ${{ secrets.GH_PAT || github.token }}

      # ── System dependencies ──────────────────────────────────────────
      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1 \
            libjavascriptcoregtk-4.1-dev \
            libnm-dev \
            xdg-utils \
            libfuse2 \
            rpm

      - name: Setup cross-compilation toolchain (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu' && matrix.os == 'ubuntu-24.04'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev:arm64 \
            libgtk-3-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            libsoup-3.0-dev:arm64 \
            libjavascriptcoregtk-4.1-dev:arm64 \
            libssl-dev:arm64
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Setup cross-compilation toolchain (armv7)
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          sudo dpkg --add-architecture armhf
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble main universe restricted multiverse" | sudo tee /etc/apt/sources.list.d/armhf.list > /dev/null
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe restricted multiverse" | sudo tee /etc/apt/sources.list.d/armhf-updates.list > /dev/null
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-security main universe restricted multiverse" | sudo tee /etc/apt/sources.list.d/armhf-security.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            libwebkit2gtk-4.1-dev:armhf \
            libgtk-3-dev:armhf \
            libayatana-appindicator3-dev:armhf \
            librsvg2-dev:armhf \
            libsoup-3.0-dev:armhf \
            libjavascriptcoregtk-4.1-dev:armhf \
            libssl-dev:armhf
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.armv7-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          EOF

      # ── Toolchain setup ──────────────────────────────────────────────
      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ── Frontend ─────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── Tauri build ──────────────────────────────────────────────────
      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles ${{ matrix.bundles }} --target ${{ matrix.target }}

      # ── Rename macOS artifacts to avoid arch collisions ──────────────
      - name: Rename macOS artifacts
        if: startsWith(matrix.os, 'macos')
        env:
          ARCH_LABEL: ${{ matrix.arch-label }}
        run: |
          cd src-tauri/target/*/release/bundle/macos/

          # Rename .app.tar.gz and .dmg with arch label
          for f in *.app.tar.gz; do
            [ -f "$f" ] && mv "$f" "${f%.app.tar.gz}_${ARCH_LABEL}.app.tar.gz"
          done
          for f in *.dmg; do
            [ -f "$f" ] && mv "$f" "${f%.dmg}_${ARCH_LABEL}.dmg"
          done

          # Rename corresponding .sig files
          for f in *.app.tar.gz.sig; do
            [ -f "$f" ] && mv "$f" "${f%.app.tar.gz.sig}_${ARCH_LABEL}.app.tar.gz.sig"
          done
          for f in *.dmg.sig; do
            [ -f "$f" ] && mv "$f" "${f%.dmg.sig}_${ARCH_LABEL}.dmg.sig"
          done

      # ── Rename Linux artifacts to avoid arch/distro conflicts ────────
      - name: Rename Linux artifacts
        if: matrix.arch-label != 'linux-arm64'
        env:
          ARCH_LABEL: ${{ matrix.arch-label }}
        run: |
          cd src-tauri/target/*/release/bundle/

          for ext in deb AppImage rpm; do
            for f in *.$ext; do
              [ -f "$f" ] && mv "$f" "${f%.$ext}_${ARCH_LABEL}.$ext"
            done
          done

          for ext in deb AppImage rpm; do
            for f in *.${ext}.sig; do
              [ -f "$f" ] && mv "$f" "${f%.${ext}.sig}_${ARCH_LABEL}.${ext}.sig"
            done
          done

      # ── Upload artifacts ─────────────────────────────────────────────
      - name: Upload updater JSON
        uses: actions/upload-artifact@v4
        with:
          name: updater-json-${{ strategy.job-index }}
          path: src-tauri/target/**/release/bundle/updater/*.json
          if-no-files-found: warn

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ strategy.job-index }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/rpm/*.rpm
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/macos/*.dmg
            src-tauri/target/**/release/bundle/dmg/*.sig
            src-tauri/target/**/release/bundle/deb/*.sig
            src-tauri/target/**/release/bundle/appimage/*.sig
            src-tauri/target/**/release/bundle/msi/*.sig
            src-tauri/target/**/release/bundle/nsis/*.sig
            src-tauri/target/**/release/bundle/rpm/*.sig
            src-tauri/target/**/release/bundle/macos/*.sig
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────
  publish-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: "{release-assets-*,updater-json-*}"
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ env.RELEASE_TAG }}"
          VER="${VERSION#v}"
          awk -v ver="$VER" '
            BEGIN { capture=0 }
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## / { capture=0; exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "See the assets below to download and install." > release_notes.md
          fi

      - name: Build latest.json from signatures
        env:
          VERSION: ${{ env.RELEASE_TAG }}
          REPO: ${{ github.repository }}
        run: |
          DOWNLOAD_BASE="https://github.com/${REPO}/releases/download/${VERSION}"
          VER="${VERSION#v}"

          read_sig() {
            local pattern="$1"
            local sig_file
            sig_file=$(find all-artifacts -name "$pattern" -type f 2>/dev/null | head -1)
            if [ -n "$sig_file" ] && [ -f "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          find_file() {
            local pattern="$1"
            local file_path
            file_path=$(find all-artifacts -name "$pattern" -type f 2>/dev/null | head -1)
            if [ -n "$file_path" ]; then
              basename "$file_path"
            else
              echo ""
            fi
          }

          # Signatures
          MACOS_AARCH64_SIG=$(read_sig "*_arm64-m14.app.tar.gz.sig")
          MACOS_X64_SIG=$(read_sig "*_x64-m13.app.tar.gz.sig")
          WINDOWS_NSIS_SIG=$(read_sig "*_x64-setup.exe.sig")
          LINUX_AMD64_SIG=$(read_sig "*_ubuntu22_amd64.AppImage.sig")
          LINUX_AARCH64_SIG=$(read_sig "*_aarch64.AppImage.sig")

          # Filenames
          MACOS_AARCH64_FILE=$(find_file "*_arm64-m14.app.tar.gz")
          MACOS_X64_FILE=$(find_file "*_x64-m13.app.tar.gz")
          WINDOWS_NSIS_FILE=$(find_file "*_x64-setup.exe")
          LINUX_AMD64_FILE=$(find_file "*_ubuntu22_amd64.AppImage")
          LINUX_AARCH64_FILE=$(find_file "*_aarch64.AppImage")

          echo "Signatures found:"
          [ -n "$MACOS_AARCH64_SIG" ] && echo "  macOS aarch64: YES ($MACOS_AARCH64_FILE)" || echo "  macOS aarch64: NO"
          [ -n "$MACOS_X64_SIG" ] && echo "  macOS x64: YES ($MACOS_X64_FILE)" || echo "  macOS x64: NO"
          [ -n "$WINDOWS_NSIS_SIG" ] && echo "  Windows x64: YES ($WINDOWS_NSIS_FILE)" || echo "  Windows x64: NO"
          [ -n "$LINUX_AMD64_SIG" ] && echo "  Linux amd64: YES ($LINUX_AMD64_FILE)" || echo "  Linux amd64: NO"
          [ -n "$LINUX_AARCH64_SIG" ] && echo "  Linux aarch64: YES ($LINUX_AARCH64_FILE)" || echo "  Linux aarch64: NO"

          # Build base JSON
          jq -n \
            --arg version "$VER" \
            --arg notes "See release page for details" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {}
            }' > all-artifacts/latest.json

          # Add each platform only if both sig and file are present
          add_platform() {
            local key="$1" file="$2" sig="$3"
            if [ -n "$sig" ] && [ -n "$file" ]; then
              jq --arg url "$DOWNLOAD_BASE/$file" \
                 --arg sig_val "$sig" \
                 '.platforms[$key] = {url: $url, signature: $sig_val}' \
                 all-artifacts/latest.json > tmp.json && mv tmp.json all-artifacts/latest.json
            fi
          }

          add_platform "darwin-aarch64"  "$MACOS_AARCH64_FILE" "$MACOS_AARCH64_SIG"
          add_platform "darwin-x86_64"   "$MACOS_X64_FILE"     "$MACOS_X64_SIG"
          add_platform "windows-x86_64"  "$WINDOWS_NSIS_FILE"  "$WINDOWS_NSIS_SIG"
          add_platform "linux-x86_64"    "$LINUX_AMD64_FILE"   "$LINUX_AMD64_SIG"
          add_platform "linux-aarch64"   "$LINUX_AARCH64_FILE" "$LINUX_AARCH64_SIG"

          echo "Generated latest.json:"
          cat all-artifacts/latest.json

      - name: Create or Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: "DazPilot ${{ env.RELEASE_TAG }}"
          tag: ${{ env.RELEASE_TAG }}
          bodyFile: "release_notes.md"
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "all-artifacts/**/*"
          artifactErrorsFailBuild: false
          replacesArtifacts: true
          makeLatest: legacy
