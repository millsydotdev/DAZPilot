name: Bridge Build and Package

on:
  push:
    tags:
      - 'plugin-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-bridge:
    name: Build Bridge (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2022
            artifact_name: DazPilotBridge.dll
          - os: macos-latest
            artifact_name: libDazPilotBridge.dylib
          - os: ubuntu-24.04
            artifact_name: libDazPilotBridge.so

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Cache Daz SDK
        uses: actions/cache@v4
        with:
          path: thirdparty/DAZStudio4.5+ SDK
          key: ${{ runner.os }}-daz-sdk-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Configure and Build
        working-directory: plugins/daz3d-bridge
        run: |
          cmake -B build -DDAZ_SDK_ROOT="${{ github.workspace }}/thirdparty/DAZStudio4.5+ SDK"
          cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.os }}
          path: plugins/daz3d-bridge/dist/${{ matrix.artifact_name }}
