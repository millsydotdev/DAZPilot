name: Bridge Build and Package

on:
  push:
    tags:
      - 'v*'
      - 'plugin-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-bridge:
    name: Build Bridge (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2022
            artifact_name: DazPilotBridge.dll
            plugin_zip: DazPilotBridge-windows-x86_64
          - os: macos-latest
            artifact_name: libDazPilotBridge.dylib
            plugin_zip: DazPilotBridge-macos-universal
          - os: ubuntu-24.04
            artifact_name: libDazPilotBridge.so
            plugin_zip: DazPilotBridge-linux-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Cache Daz SDK
        uses: actions/cache@v4
        with:
          path: thirdparty/DAZStudio4.5+ SDK
          key: ${{ runner.os }}-daz-sdk-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Configure and Build
        working-directory: plugins/daz3d-bridge
        run: |
          cmake -B build -DDAZ_SDK_ROOT="${{ github.workspace }}/thirdparty/DAZStudio4.5+ SDK"
          cmake --build build --config Release

      - name: Verify bridge exports (Windows only)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $dll = "plugins/daz3d-bridge/dist/DazPilotBridge.dll"
          $dumpbin = "${env:VCToolsInstallDir}bin\Hostx64\x64\dumpbin.exe"
          if (-not (Test-Path $dumpbin)) {
            $dumpbin = (Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter dumpbin.exe |
              Where-Object FullName -like "*Hostx64*x64*" |
              Select-Object -First 1 -ExpandProperty FullName)
          }
          if ($dumpbin) {
            $exports = & $dumpbin /EXPORTS $dll | Out-String
            foreach ($symbol in @("getSDKVersion", "getPluginDefinition")) {
              if ($exports -notmatch "\b$symbol\b") {
                throw "Bridge DLL is missing required Daz export: $symbol"
              }
            }
          }

      - name: Package plugin zip
        shell: bash
        run: |
          mkdir -p release/plugin
          cp plugins/daz3d-bridge/dist/${{ matrix.artifact_name }} release/plugin/
          cp plugins/daz3d-bridge/README.md release/plugin/
          cd release/plugin
          tar czf ../../${{ matrix.plugin_zip }}-${{ github.ref_name }}.tar.gz *
          cd ../..
          if [ "${{ matrix.os }}" = "windows-2022" ]; then
            7z a ${{ matrix.plugin_zip }}-${{ github.ref_name }}.zip ./release/plugin/*
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.os }}
          path: plugins/daz3d-bridge/dist/${{ matrix.artifact_name }}

      - name: Upload plugin to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ${{ matrix.plugin_zip }}-${{ github.ref_name }}.tar.gz
            ${{ matrix.plugin_zip }}-${{ github.ref_name }}.zip
            plugins/daz3d-bridge/dist/${{ matrix.artifact_name }}
