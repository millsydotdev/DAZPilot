name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for DazPilot? Tell us what problem you are trying to solve.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Scene control / AI commands
        - Bridge plugin
        - Desktop app UI
        - Asset or SDK indexing
        - Script IDE / agents
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish? What is hard or missing today?
      placeholder: I want to ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you have tried?

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions for similar requests
          required: true
