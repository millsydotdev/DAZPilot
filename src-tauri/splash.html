<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DAZPilot</title>
    <style>
        body {
            margin: 0; padding: 0; background: transparent;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; font-family: sans-serif; color: #fff;
        }
        .logo { width: 120px; height: 120px; margin-bottom: 20px; 
                background: #4a90e2; border-radius: 50%; }
        .message { font-size: 18px; }
    </style>
</head>
<body>
    <div>
        <div class="logo"></div>
        <div class="message" id="message">Starting DAZPilot...</div>
    </div>
    <script>
        window.__TAURI__.event.listen("update-available", () => {
            document.getElementById("message").textContent = "Downloading update...";
        });
    </script>
</body>
</html>
